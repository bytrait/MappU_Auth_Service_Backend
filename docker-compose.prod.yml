version: '3.8'

services:
  redis:
    image: redis:7
    container_name: redis
    restart: always

    ports:
      - "6379:6379"

    #  Critical: prevent memory overflow + auto cleanup
    command: >
      redis-server
      --appendonly no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: .
      args:
        FRONTEND_ENV: |
          VITE_API_URL=http://164.92.115.205:8000/api/v2

    container_name: auth-service

    ports:
      - "8000:8000"

    env_file:
      - /home/mappu/envs/auth-service/.env

    restart: always

    depends_on:
      redis:
        condition: service_healthy

    # Wait for Redis + run migrations safely
    command: >
      sh -c "
      echo '⏳ Waiting for Redis...' &&
      sleep 3 &&
      npx prisma migrate deploy &&
      node index.js
      "

    extra_hosts:
      - "host.docker.internal:host-gateway"