version: "3.8"

services:
  redis:
    image: redis:7
    container_name: redis
    restart: always

    ports:
      - "6379:6379"

    # 🔥 Dev-safe + production-safe config
    command: >
      redis-server
      --appendonly no
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  postgres:
    image: postgres:15
    container_name: postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sanket0506
      POSTGRES_DB: authdb

    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - "5434:5432"

    # ✅ Postgres should NOT depend on Redis
    depends_on:
      - redis


  auth-service:
    build:
      context: .

    container_name: auth-service

    env_file:
      - ./auth-service/.env.development

    ports:
      - "3000:3000"

    restart: always

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_started

    # 🔥 Stable startup sequence
    command: >
      sh -c "
      echo '⏳ Waiting for dependencies...' &&
      sleep 3 &&
      npx prisma migrate deploy &&
      node index.js
      "

    # Uncomment for live dev (optional)
    # volumes:
    #   - ./auth-service:/app


volumes:
  pgdata: